<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UvaFlix</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=inter:400,600,700" rel="stylesheet" />
    <link rel="stylesheet" href="../style/contato.css">
    <link rel="shortcut icon" href="../images/favicon.png" type="image/x-icon">
</head>
<body>
    <header class="site-header">
      <nav class="site-nav" aria-label="Principal">
        <a href="./catalogo.html" class="logo-link" aria-label="Ir para o catálogo">
          <h1><strong>Uva</strong>fli<strong>x</strong></h1>
        </a>
        <div class="nav-links">
          <a href="./index.html">Inicio</a>
          <a href="./sobre.html">Sobre</a>
          <a href="./novidades.html">Novidades</a>
          <a href="./contato.html" aria-current="page">Contato</a>
        </div>
      </nav>
    </header>
    <main>
      <div class="contact-form">
        <img src="../images/Logo-Img.png" alt="UvaFlix" class="logo-form" width="300" height="200" />
        <div class="form-container">
          <h1>Entre em <span class="t_ctt">contato</span> conosco!</h1>
          <form>
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Digite seu email" required>

            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem" required></textarea>

            <button type="submit">Enviar</button>
          </form>
        </div>
      </div>
    </main>
</body>
</html>
